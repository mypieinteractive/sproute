<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sproute Route Optimization</title>
    
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <?!= HtmlService.createHtmlOutputFromFile('styles').getContent(); ?>
</head>
<body>

    <div id="processing-overlay" style="display: flex;">
        <div class="spinner"></div>
        <span>Loading Data...</span>
    </div>

    <div id="map-wrapper">
        <div id="map-brand" class="floating-brand">
            <img id="brand-logo-map" src="" alt="Sproute Logo" style="height: 30px; object-fit: contain;">
            <span id="map-driver-name">Loading...</span>
        </div>
        <div id="map"></div>
    </div>

    <div id="resizer"></div>

    <div id="sidebar">
        
        <div class="sidebar-header">
            <img id="brand-logo-sidebar" src="" alt="Sproute Logo">
            <span id="sidebar-driver-name">Loading...</span>
            
            <div id="inspector-dropdown-wrapper" style="display: none; width: 100%;">
                <select id="inspector-filter" onchange="handleInspectorFilterChange(this.value)" style="width: 100%; max-width: 100%;">
                    <option value="all">All Inspectors</option>
                </select>
            </div>
        </div>
        
        <div class="sidebar-toolbar">
            <input type="text" id="search-input" placeholder="Search orders..." onkeyup="filterList()">
            <div class="view-toggles">
                <button id="btn-detailed" class="active" onclick="setDisplayMode('detailed')"><i class="fa-solid fa-list"></i></button>
                <button id="btn-compact" onclick="setDisplayMode('compact')"><i class="fa-solid fa-bars"></i></button>
            </div>
        </div>

        <div class="manager-controls" id="manager-tools" style="display: flex; flex-direction: column; gap: 10px; padding: 10px;">
            <p id="inspector-select-hint" style="display: none; font-size: 12px; color: var(--text-muted);">Select an inspector to generate or edit routes.</p>
            <button id="btn-header-optimize" style="display: none;" onclick="handleOptimize()">Optimize Route</button>
            
            <div id="route-divider-group" style="display: none; gap: 5px;">
                <button id="rbtn-1" class="active" onclick="setRoutes(1)">1 Route</button>
                <button id="rbtn-2" onclick="setRoutes(2)">2 Routes</button>
                <button id="rbtn-3" onclick="setRoutes(3)">3 Routes</button>
            </div>
            
            <div id="priority-container" style="display: none; flex-direction: column;">
                <label for="slider-priority" style="font-size: 12px;">Routing Priority (Distance vs Due Date)</label>
                <input type="range" id="slider-priority" min="0" max="100" value="50" onchange="liveClusterUpdate()">
            </div>
            
            <button id="btn-generate-route" style="display: none;" onclick="handleGenerateRoute()">Generate Route</button>
        </div>

        <div class="summary-dashboard" style="padding: 10px; border-bottom: 1px solid #333;">
            <div class="stat-row" style="display: flex; justify-content: space-between;">
                <span id="sum-dist">0.0 mi</span>
                <span id="sum-time">0 hrs</span>
            </div>
            <div class="stat-row" style="display: flex; justify-content: space-between; font-size: 12px;">
                <span id="stat-total">0 Orders</span>
                <span id="stat-due">0 Due Today</span>
                <span id="stat-past">0 Past Due</span>
            </div>
            <div class="route-times-row" style="display: flex; justify-content: space-between; font-size: 12px;">
                <span id="rtime-1">-- hrs</span>
                <span id="rtime-2">-- hrs</span>
                <span id="rtime-3">-- hrs</span>
            </div>
        </div>

        <div class="bulk-actions" style="padding: 10px; display: flex; gap: 5px; flex-wrap: wrap;">
            <button id="bulk-delete-btn" style="display: none; background: var(--red);" onclick="triggerBulkDelete()">Delete Selected</button>
            <button id="bulk-unroute-btn" style="display: none; background: var(--orange);" onclick="triggerBulkUnroute()">Unroute Selected</button>
            <button id="bulk-complete-btn" style="display: none; background: var(--green);" onclick="toggleComplete(event, null)">Mark Complete</button>
            
            <button id="move-r1-btn" style="display: none;" onclick="moveSelectedToRoute(0)">Move to R1</button>
            <button id="move-r2-btn" style="display: none;" onclick="moveSelectedToRoute(1)">Move to R2</button>
            <button id="move-r3-btn" style="display: none;" onclick="moveSelectedToRoute(2)">Move to R3</button>
        </div>

        <div id="stop-list" class="stop-list-container" style="flex: 1; overflow-y: auto;">
            </div>

        <div id="controls" class="floating-controls" style="display: none; padding: 10px; gap: 10px;">
            <button onclick="handleUndo()" style="background: #444;">Undo</button>
            <button onclick="handleCalculate()" style="background: var(--blue);">Calculate & Save</button>
        </div>
    </div>

    <div class="rocker"></div>

    <div id="modal-overlay" style="display: none; position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.7); z-index: 9999; justify-content: center; align-items: center;">
        <div id="modal-content" style="background: #222; padding: 20px; border-radius: 8px; width: 300px; max-width: 90%;">
            </div>
    </div>

    <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    
    <?!= HtmlService.createHtmlOutputFromFile('app.js').getContent(); ?>

</body>
</html>
